version: "3.9"

services:
  qdrant:
    image: qdrant/qdrant:v1.9.2
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    # Pull mistral on first start
    entrypoint: ["/bin/sh", "-c", "ollama serve & sleep 10 && ollama pull mistral; wait"]
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 15s

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    depends_on:
      qdrant:
        condition: service_started
      ollama:
        condition: service_healthy
    environment:
      QDRANT_HOST: qdrant
      OLLAMA_HOST: http://ollama:11434

  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    environment:
      BACKEND_URL: http://backend:8000
    depends_on:
      - backend

volumes:
  qdrant_data:
  ollama_data:
